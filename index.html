<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>O2 BTS Mapa</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/main.css">
    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-900">

    <!-- Mapa kontejner -->
    <div id="map" class="absolute inset-0 w-full h-full"></div>

    <!-- Přepínač mapových vrstev -->
    <div id="map-switcher" class="ui-overlay">
        <button class="map-btn active" data-style="basic" title="Základní">🗺️</button>
        <button class="map-btn" data-style="outdoor" title="Turistická">🥾</button>
        <button class="map-btn" data-style="aerial" title="Satelit">🛰️</button>
        <button class="map-btn" data-style="aerial-labels" title="Satelit + popisky">🏷️</button>
    </div>

    <!-- Tlačítko kompasu (rotace dle reality) -->
    <button id="compass-btn" class="ui-overlay compass-btn" title="Orientace dle kompasu">
        <svg id="compass-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12,2 15,14 12,11 9,14" fill="#ef4444" stroke="#ef4444"/>
            <polygon points="12,22 9,14 12,11 15,14" fill="#94a3b8" stroke="#94a3b8"/>
        </svg>
    </button>

    <!-- Skripty logiky -->
    <script src="js/storage-logic.js"></script>
    <script>
        document.write('<script src="js/map-logic.js?v=' + new Date().getTime() + '"><\/script>');
    </script>
</body>
</html>
