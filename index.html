<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>O2 BTS Mapa</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/main.css">
    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-900">

    <!-- Mapa kontejner -->
    <div id="map" class="absolute inset-0 w-full h-full"></div>

    <!-- Plovoucí upozornění na technický režim (skryté) -->
    <div id="tech-mode-alert" class="ui-overlay absolute top-4 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-4 py-2 rounded-full shadow-lg font-bold text-sm hidden transition-opacity duration-300">
        Technický režim aktivní
    </div>

    <!-- Plovoucí ovládací prvky - Přepínač kružnic -->
    <div class="ui-overlay absolute top-4 right-4 bg-white/90 backdrop-blur rounded-lg shadow-md p-3 text-sm font-semibold">
        <label class="flex items-center space-x-2 cursor-pointer">
            <input type="checkbox" id="toggle-circles" class="form-checkbox h-4 w-4 text-blue-600 rounded" checked>
            <span>Dosah BTS (Kružnice)</span>
        </label>
    </div>

    <!-- Vysouvací panel pro detail BTS -->
    <div id="bts-panel" class="ui-overlay fixed bottom-0 left-0 right-0 bg-white shadow-2xl rounded-t-2xl slide-up max-h-[80vh] overflow-y-auto hidden">
        <div class="p-5 relative">
            <button id="close-panel" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <h2 id="bts-title" class="text-xl font-bold mb-1">BTS Detail</h2>
            <p id="bts-id" class="text-xs text-gray-400 mb-4 font-mono">ID: -</p>

            <!-- Veřejný popisek -->
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Veřejný popisek</label>
                <textarea id="public-note" rows="2" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Přidejte veřejnou poznámku..."></textarea>
            </div>

            <!-- Pole pro zadání hesla k technické poznámce -->
            <div id="tech-auth-container" class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Přístup k technické poznámce</label>
                <div class="flex space-x-2">
                    <input type="password" id="tech-password" class="flex-1 border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-red-500 outline-none" placeholder="Zadejte tajný klíč">
                    <button id="btn-unlock-tech" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-900 transition-colors">Odemknout</button>
                </div>
            </div>

            <!-- Skrytá technická poznámka (zobrazí se po ověření) -->
            <div id="tech-note-container" class="mb-4 hidden">
                <label class="block text-sm font-bold text-red-600 mb-1">Technická poznámka (Tajné)</label>
                <textarea id="tech-note" rows="3" class="w-full border border-red-300 bg-red-50 rounded-lg p-2 text-sm focus:ring-2 focus:ring-red-500 outline-none" placeholder="Zadejte technické detaily..."></textarea>
            </div>

            <button id="btn-save" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700 transition-colors shadow-md">Uložit změny</button>
        </div>
    </div>

    <!-- Skripty logiky -->
    <script src="js/storage-logic.js"></script>
    <script src="js/map-logic.js"></script>
</body>
</html>
